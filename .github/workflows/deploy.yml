name: Build & Deploy

# Stratégie : push -> CI build des images -> push GHCR -> Dokploy pull (webhook).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # autorise le GITHUB_TOKEN à pousser sur GHCR

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/titoo-dev/shazam-malgache-api
  ADMIN_IMAGE: ghcr.io/titoo-dev/shazam-malgache-admin

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:latest
            ${{ env.API_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build & push Admin image
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          file: ./admin/Dockerfile
          push: true
          # API_URL = nom du service API dans le compose de prod (réseau interne).
          build-args: |
            API_URL=http://api:8000
          tags: |
            ${{ env.ADMIN_IMAGE }}:latest
            ${{ env.ADMIN_IMAGE }}:${{ github.sha }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin

      - name: Trigger Dokploy deploy
        run: |
          if [ -z "${{ secrets.DOKPLOY_DEPLOY_WEBHOOK }}" ]; then
            echo "::warning::DOKPLOY_DEPLOY_WEBHOOK non défini — déploiement non déclenché."
            exit 0
          fi
          curl -fsS -X POST "${{ secrets.DOKPLOY_DEPLOY_WEBHOOK }}"
          echo "Déploiement Dokploy déclenché."
