services:
  api:
    build: .
    image: shazam-mlg
    command: uvicorn shazam_malgache.api:app --host 0.0.0.0 --port 8000
    environment:
      SHAZAM_DB: /data/shazam.db
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data        # base (métadonnées + empreintes) persistée ici. Jamais d'audio.
