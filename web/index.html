<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shazam Malgache 🇲🇬</title>
  <style>
    :root { --vert:#007e3a; --rouge:#fc3d32; --blanc:#fff; --bg:#0e1116; }
    * { box-sizing: border-box; }
    body {
      margin:0; min-height:100vh; font-family: system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #16202c, var(--bg));
      color:#e8eef5; display:flex; flex-direction:column; align-items:center;
      justify-content:center; gap:1.5rem; padding:2rem;
    }
    h1 { font-size:1.7rem; margin:0; letter-spacing:.5px; }
    .flag { display:inline-block; width:46px; height:30px; border-radius:4px; overflow:hidden;
      vertical-align:middle; margin-right:.5rem; }
    .flag div { height:100%; }
    .listen {
      width:170px; height:170px; border-radius:50%; border:none; cursor:pointer;
      background: linear-gradient(145deg, var(--vert), #00a84e); color:#fff;
      font-size:1.05rem; font-weight:600; box-shadow:0 10px 40px rgba(0,168,78,.35);
      transition: transform .15s ease;
    }
    .listen:hover { transform: scale(1.04); }
    .listen.rec { background: linear-gradient(145deg, var(--rouge), #ff6b5e);
      animation: pulse 1.2s infinite; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(252,61,50,.5);} 50%{box-shadow:0 0 0 22px rgba(252,61,50,0);} }
    #result { min-height:90px; text-align:center; }
    .title { font-size:1.5rem; font-weight:700; }
    .artist { color:#9fb3c8; }
    .score { font-size:.85rem; color:#6c8098; margin-top:.4rem; }
    .none { color:#ff8a7e; }
    label.upload { font-size:.85rem; color:#9fb3c8; cursor:pointer; text-decoration:underline; }
    input[type=file] { display:none; }
  </style>
</head>
<body>
  <h1>
    <span class="flag"><div style="background:#fff"></div><div style="background:var(--rouge)"></div><div style="background:var(--vert)"></div></span>
    Shazam Malgache
  </h1>

  <button id="btn" class="listen">🎤 Écouter</button>
  <div id="result"></div>
  <label class="upload">ou choisir un fichier audio
    <input type="file" id="file" accept="audio/*" />
  </label>

  <script>
    const btn = document.getElementById('btn');
    const result = document.getElementById('result');
    const fileInput = document.getElementById('file');
    let mediaRecorder, chunks = [];

    function show(html) { result.innerHTML = html; }

    async function send(blob, filename) {
      show('⏳ Analyse…');
      const fd = new FormData();
      fd.append('file', blob, filename);
      try {
        const r = await fetch('/recognize', { method: 'POST', body: fd });
        const data = await r.json();
        if (data.match) {
          show(`<div class="title">🎵 ${data.match.title}</div>
                <div class="artist">${data.match.artist || ''}</div>
                <div class="score">confiance ${(data.match.confidence*100).toFixed(0)}% · score ${data.match.score}</div>`);
        } else {
          show('<div class="none">Chanson non reconnue 🤔</div>');
        }
      } catch (e) {
        show('<div class="none">Erreur : ' + e.message + '</div>');
      }
    }

    btn.onclick = async () => {
      if (mediaRecorder && mediaRecorder.state === 'recording') { mediaRecorder.stop(); return; }
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        chunks = [];
        mediaRecorder.ondataavailable = e => chunks.push(e.data);
        mediaRecorder.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          btn.classList.remove('rec'); btn.textContent = '🎤 Écouter';
          send(new Blob(chunks, { type: 'audio/webm' }), 'mic.webm');
        };
        mediaRecorder.start();
        btn.classList.add('rec'); btn.textContent = '⏹ Stop';
        // enregistrement automatique de 8 s
        setTimeout(() => { if (mediaRecorder.state === 'recording') mediaRecorder.stop(); }, 8000);
      } catch (e) {
        show('<div class="none">Micro inaccessible : ' + e.message + '</div>');
      }
    };

    fileInput.onchange = () => { if (fileInput.files[0]) send(fileInput.files[0], fileInput.files[0].name); };
  </script>
</body>
</html>
